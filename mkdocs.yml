site_name: EvadeX
site_url: https://deadsec07.github.io/evadex/
site_description: Educational pursuit-evasion simulator with a minimal reinforcement learning environment, telemetry logging, and scenario-driven experimentation.
theme:
  name: material
  features:
    - navigation.sections
    - navigation.path
    - content.code.annotate
    - content.code.copy
nav:
  - Home: index.md
  - Usage: usage.md
  - Scenarios: scenarios.md
  - Development: development.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
