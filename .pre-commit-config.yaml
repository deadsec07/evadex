repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length=100"]
  - repo: https://github.com/pytest-dev/pytest
    rev: v8.3.3
    hooks:
      - id: pytest
        additional_dependencies: []

