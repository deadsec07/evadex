name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,docs]
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Tests
        run: pytest -q
      - name: Build Docs
        run: |
          mkdocs build --strict
